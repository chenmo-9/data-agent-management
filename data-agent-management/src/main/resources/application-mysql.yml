server:
  port: 8065

# The MySQL profile stores DataAgent management metadata persistently.
# Business data, such as test.orders, still lives in the business datasource configured in the UI.
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dataagent_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:sql/mysql/schema-mysql.sql
      separator: ;
      encoding: utf-8
  ai:
    vectorstore:
      type: simple
    alibaba:
      data-agent:
        vector-store:
          table-topk-limit: 10
          table-similarity-threshold: 0.2
          default-topk-limit: 8
          default-similarity-threshold: 0.4
        llm-service-type: stream
        code-executor:
          code-pool-executor: local
          python-max-tries-count: 5
        file:
          type: local
          path-prefix: data-agent
          path: uploads
          url-prefix: /uploads
          imageSize: 2097152
        max-sql-retry-count: 10

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.alibaba.cloud.ai.dataagent.service: debug
    com.alibaba.cloud.ai.dataagent.workflow.node: debug
    com.alibaba.cloud.ai.mapper: debug
    org.springframework.jdbc: debug
